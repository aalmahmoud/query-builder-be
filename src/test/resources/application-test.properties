# Test-only configuration. Loaded automatically by Spring Boot tests via the "test" profile,
# or referenced explicitly with @TestPropertySource / @ActiveProfiles("test").

# JWT secret only for tests. Generated with: openssl rand -base64 48.
jwt.secret=Y4sLZeQyOQg2Q8FaBJh3CzJQ0wMl9p1H5dWxQy5xkRk9bxqJqgUq+wqRhCmnCt7L
jwt.expiration=3600000

# AES-256 encryption key for column-level PII protection (Phase 4 fix 4.15).
# 32 bytes, base64-encoded. Generated with: openssl rand -base64 32.
app.encryption.key=q9bX5xZ7sAJ2vR3kY8nT4mW1cP6dF0hL5gN+B/CnK4U=

# Use H2 in-memory for unit/integration tests.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# Mirror what production should be: OSIV off. Phase 1 fix 1.6 must work without it.
spring.jpa.open-in-view=false
