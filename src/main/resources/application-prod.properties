# Production-only overrides. Activate with --spring.profiles.active=prod
#
# Phase 4 fix 4.7: locks down dev-only verbosity.

# Hibernate / JPA — never log SQL or values in prod.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Swagger UI is a development aid; disable in production.
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Actuator: don't leak component details unauthenticated.
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized

# CORS: deny by default; set CORS_ALLOWED_ORIGINS env var explicitly per deployment.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}
