spring.application.name=querydslbuilder

# PostgreSQL Database Configuration
# Replace with your actual database credentials or use environment variables:
# SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=jdbc:postgresql://localhost:5432/query_builder_db
spring.datasource.username=${DB_USERNAME:your_username}
spring.datasource.password=${DB_PASSWORD:your_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}

# JPA Auditing
spring.data.jpa.repositories.enabled=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# Server Configuration
server.port=8080

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=always
management.prometheus.metrics.export.enabled=false

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Logging Configuration
#logging.level.root=INFO
#logging.level.querydsl=DEBUG
#logging.file.name=${LOG_FILE:logs/application.log}
#logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
#logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# JWT Configuration
# JWT_SECRET must be set in the environment. Minimum 32 bytes (256 bits for HS256).
# Generate one with: openssl rand -base64 48
jwt.secret=${JWT_SECRET}
# Access-token lifetime. Default 24h kept for compatibility with existing clients;
# tighten via env var (e.g. 900000 = 15 min) once refresh-token flow is in use.
jwt.expiration=${JWT_EXPIRATION_MS:86400000}
# Refresh-token lifetime. Default 7 days.
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Login rate-limit (per IP). 5 attempts per minute.
security.login.rate-limit.capacity=${LOGIN_RATE_LIMIT_CAPACITY:5}
security.login.rate-limit.refill-period-seconds=${LOGIN_RATE_LIMIT_REFILL_SECONDS:60}

# AES-256 / HMAC-SHA256 key for column-level PII protection (national_id, etc.).
# 32 bytes, base64-encoded. Generate with: openssl rand -base64 32.
# REQUIRED — app refuses to start if unset.
app.encryption.key=${APP_ENCRYPTION_KEY}
# The V6 Flyway migration runs before Spring beans exist, so it can't read the
# property above directly. Expose the same value as a Flyway placeholder; V6 reads
# this first and falls back to the APP_ENCRYPTION_KEY env var (used in prod).
spring.flyway.placeholders.app_encryption_key=${app.encryption.key}
